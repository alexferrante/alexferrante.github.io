<!DOCTYPE html>
<html lang="en">
    {% include head.html %}
  <body>
    <header>
      <div class="wrapper">
        <div class="nav">
          <span><a href="/">Alex Ferrante</a><a href="/posts">/Posts</a></span>
        </div>
      </div>
  </header>
    <div>
        <ul class="posts-container">
            {% for post in site.categories.posts %}
              <li>
                <a href="{{ post.url }}"><h3>{{ post.title }}</h3></a>
                <h4><span datetime="{{ post.date | date: '%F' }}">{{ post.date | date: "%m.%-d.%Y" }}</span></h4>
              </li>
            {% endfor %}
          </ul>
    </div>
  </body>
</html>
