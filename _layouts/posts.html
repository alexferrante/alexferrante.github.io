<!DOCTYPE html>
<html lang="en">
    {% include head.html %}
  <body>
    {% include header.html %}
    {% include side.html %}
    <div>
        <ul class="posts">
            {% for post in site.categories.posts %}
              <li>
                <a href="{{ post.url }}"><h2>{{ post.title }}</h2></a>
                <h4><span datetime="{{ post.date | date: '%F' }}">{{ post.date | date: "%m.%-d.%Y" }}</span></h4>
              </li>
            {% endfor %}
          </ul>
    </div>
  </body>
</html>
