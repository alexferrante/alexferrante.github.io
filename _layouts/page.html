<!DOCTYPE html>
<html lang="en">
  {% include head.html %}
  <body style="overflow: hidden">
  <header>
      <div class="wrapper">
        <div class="nav">
          <span><a href="/">Alex Ferrante</a></span>
        </div>
      </div>
  </header>
  {% include side.html %}
  <div class="main-piece">
    <p><a href="/posts">Recent posts</a></p>
    <ul>
      {% for post in site.categories.posts  limit:3 %}
        <li>
          <p>
            <a href="{{ post.url }}"><span datetime="{{ post.date | date: '%F' }}">{{ post.date | date: "%m.%-d.%Y" }}</span> {{ post.title }}</a>
          </p>
        </li>
      {% endfor %}
    </ul>
  </div>
  {% include navigation.html %}
  </body>
</html>
