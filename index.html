<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>~~~~</title>
    <meta name="description" content="">
    <style>
      html, body, div, span, a, p, ul, li, h1, code, nav {
        margin: 0;
        border: 0;
        padding: 0;
        box-sizing: inherit;
        font: inherit;
        text-decoration: inherit;
        text-align: inherit;
        color: inherit;
        background: transparent;
      }
      html, body { height: 100%; }
      html { background-color: rgb(182, 221, 182); }
      #root { background-color: #F0F0F0; min-height: 100%; }
      body { overflow-x: hidden; }
    </style>
    <script type="text/javascript">
      (function(x) {
        if (x.search) {
          var y = {};
          x.search.slice(1).split('&').forEach(function(z) {
            var a = z.split('=');
            y[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (y.p !== undefined) {
            window.history.replaceState(null, null,
              x.pathname.slice(0, -1) + (y.p || '') +
              (y.y ? ('?' + y.y) : '') +
              x.hash
            );
          }
        }
      }(window.location))
    </script>
    <link href="https://fonts.googleapis.com/css?family=IBM+Plex+Sans&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Heebo&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script src="/build/bundle.js"></script>
  </body>
</html>
